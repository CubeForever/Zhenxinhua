<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>真心话 - 说出你的故事</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 登录页面 -->
  <div id="auth-page" class="page">
    <div class="auth-container">
      <div class="logo">💬</div>
      <h1>真心话</h1>
      <p class="subtitle">说出你的故事，倾听他人的心声</p>
      <button id="enter-btn" class="btn btn-primary">
        <span class="icon">🚀</span>
        立即进入
      </button>
      <p class="auth-tips">无需注册，匿名使用</p>
    </div>
  </div>

  <!-- 主页面 -->
  <div id="main-page" class="page hidden">
    <header class="header">
      <h1>真心话</h1>
      <button id="logout-btn" class="btn btn-small">退出</button>
    </header>

    <main class="main-content">
      <!-- 问题卡片 -->
      <div class="question-card">
        <div class="question-badge" id="question-badge">系统问题</div>
        <p class="question-text" id="question-text">点击获取问题</p>
        <button id="next-question-btn" class="btn btn-secondary">下一个问题</button>
      </div>

      <!-- 回答区域 -->
      <div class="answer-section">
        <textarea id="answer-input" placeholder="写下你的回答..." rows="4"></textarea>
        <button id="submit-answer-btn" class="btn btn-primary">提交回答</button>
      </div>

      <!-- 提交新问题 -->
      <div class="submit-question-section">
        <h3>提交新问题</h3>
        <textarea id="new-question-input" placeholder="输入你想问的问题..." rows="3"></textarea>
        <button id="submit-question-btn" class="btn btn-secondary">提交问题</button>
      </div>

      <!-- 我的回答 -->
      <div class="my-answers-section">
        <h3>我的回答</h3>
        <div id="my-answers-list" class="answers-list">
          <p class="empty">暂无回答</p>
        </div>
      </div>
    </main>
  </div>

  <!-- 提示消息 -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/app.js"></script>
</body>
</html>
